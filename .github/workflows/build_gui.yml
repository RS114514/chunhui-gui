name: Build and Release GUI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter Pillow pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name chunhui-gui-win --icon=app.ico main_gui.py

    - name: Create Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chunhui-gui-windows
        path: dist/chunhui-gui-win.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter Pillow pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name chunhui-gui-mac --icon=app.icns main_gui.py

    - name: Compress macOS Application
      run: |
        cd dist
        zip -r chunhui-gui-mac.zip chunhui-gui-mac.app || zip -r chunhui-gui-mac.zip chunhui-gui-mac

    - name: Create Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chunhui-gui-macos
        path: dist/chunhui-gui-mac.zip

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: chunhui-gui-windows
        path: dist

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: chunhui-gui-macos
        path: dist

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest GUI Release (Auto Build)
        body: |
          # 最新构建发布说明 (Latest Release)
          
          春晖中学校园网跨平台 GUI 客户端最新的自动编译版本。
          
          ### 📦 包含资源：
          - **`chunhui-gui-win.exe`**: Windows 64位独立运行版（免安装，解压即用）。
          - **`chunhui-gui-mac.zip`**: macOS 平台便携绿色压缩包（解压缩后双击即可运行）。
          
          ---
          
          ## 📅 版本更新与演进
          
          ### 🔄 重构对比：当前版本 vs 初代版本
          
          为了提供极致的图形化体验，我们对 GUI 客户端进行了深度的重构和视觉打磨。以下是当前最新版本与最早原始版本的核心对比：
          
          | 维度 | 初代版本 (原始纯文本) | 当前版本 (重构优化版) |
          | :--- | :--- | :--- |
          | **富文本渲染** | 消息公告详情使用简陋的普通文本框显示，格式标签（如 `**` 等）直接外露，无排版可言。 | 深度集成 Markdown 渲染引擎，四大详情窗口全面支持粗体高亮、下划线链接及标题排版，自动过滤原生 HTML 标签。 |
          | **表格对齐** | 表头、加粗文本与竖线分割符因字号比例不一而在缩放时严重歪斜，无法对齐。 | 强制统一表格区域字号为 14 号，搭配等宽 monospace 字体，并利用中英文视觉宽度填充，完美解决对齐 Bug。 |
          | **列表滑动性能** | 采用 Canvas 嵌套大量复杂 CTk 控件，导致数据多时滑动非常卡顿。 | 重构为扁平化网格布局，并使用原生 `tk.Label` 优化渲染性能，数千条记录滑动依旧如丝般顺滑。 |
          | **相册与现场** | 只能查看违纪文字描述，无法直观浏览现场照片或查看相册。 | 引入相册浏览面板 `GalleryFrame`，支持分级目录导航与大图现场照片下载，违纪画面一览无余。 |
          | **文件寄存交互** | 只能通过 CLI 上传，没有图形化状态指示。 | 支持图形化文件拖拽/选择上传，配备百分比进度条与 100MB 逻辑分片上传逻辑，一键复制 6 位提取密码。 |
          | **运行与分发** | 仅支持本地 Python 环境调试运行。 | 通过 GitHub Actions 自动化工作流提供 Windows 免依赖 `.exe` 绿色单文件和带有独立 icon 标志的 macOS `.app` 包。 |
          | **测试工具** | 每次调试排版都必须登录校园网拉取真实数据。 | 新增离线排版测试工具 `test_gui.py`，支持左侧编辑 HTML、右侧实时预览 Markdown 表格渲染，开发效率翻倍。 |
          
          ---
          
          ### [v1.2.0] - 最新重构版更新项
          #### 🎨 客户端功能与排版升级
          - **分片大小规范化**：将大文件分片逻辑统一修改并限制为 **100MB**，解决在图形化进度条上传大文件时的合并状态响应问题。
          - **表格完美像素对齐**：通过规整 `table_sep` 的字号与字体配置，解决 CustomTkinter 在高 DPI 缩放下的 Text 标签渲染错位。
          - **免联线离线测试器**：新增 `test_gui.py` 辅助调试工具，极大地便利了富文本排版的本地离线调试。
        draft: false
        prerelease: false
        files: |
          dist/chunhui-gui-win.exe
          dist/chunhui-gui-mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
